# ======================================================================
#  Apache (служба httpd2) — конфиг сайта ServiceDesk
#  Куда положить:  /etc/httpd2/conf/sites-available/servicedesk.conf
#  Включить:       a2ensite servicedesk   (и a2dissite 000-default)
#
#  Нужные модули (включить один раз):
#     a2enmod ssl proxy proxy_http headers auth_gssapi
#     systemctl restart httpd2
#
#  Что умеет этот конфиг:
#   • HTTPS (TLS-сертификаты);
#   • автоматический вход по Kerberos (доменный ПК — без пароля);
#   • если Kerberos не сработал — ручной ввод ДОМЕННОГО логина/пароля (Basic);
#   • аварийный вход ЛОКАЛЬНОЙ учёткой через /login, если домен недоступен.
# ======================================================================

# 1) HTTP (порт 80) — только перенаправление на HTTPS
<VirtualHost *:80>
    ServerName  srv01061.polyot.ru
    ServerAlias help.polyot.ru sd.polyot.ru
    Redirect permanent / https://srv01061.polyot.ru/
</VirtualHost>

# 2) HTTPS (порт 443) — основной сайт
<VirtualHost *:443>
    ServerName  srv01061.polyot.ru
    ServerAlias help.polyot.ru sd.polyot.ru     # все остальные FQDN через пробел

    # --- TLS-сертификаты ---
    SSLEngine on
    SSLCertificateFile      /var/lib/ssl/servicedesk/srv01061.cer.pem
    SSLCertificateKeyFile   /var/lib/ssl/servicedesk/srv01061.key.pem
    SSLCertificateChainFile /var/lib/ssl/servicedesk/sub.crt

    # Имя доменного пользователя пробрасываем приложению ЗАГОЛОВКОМ и затираем то,
    # что мог прислать клиент. На путях без авторизации значение пустое/"(null)" —
    # приложение его игнорирует.
    RequestHeader set X-Remote-User "%{REMOTE_USER}s"

    # --- Проксирование на приложение (gunicorn слушает только localhost) ---
    ProxyPreserveHost On
    ProxyRequests Off

    # --- 1) WebSocket: апгрейд Upgrade: websocket -> ws://gunicorn ----------
    # ЭТО ДОЛЖНО ИДТИ ПЕРВЫМ, до обычного ProxyPass.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade   [NC]
    RewriteRule ^/socket\.io/(.*)$ ws://127.0.0.1:8000/socket.io/$1 [P,L]

    # --- 2) Обычный HTTP-трафик Socket.IO (long-polling) и весь сайт -------
    ProxyPass        /socket.io/ http://127.0.0.1:8000/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:8000/socket.io/

    # Свои страницы ошибок Apache (/error/*.var) НЕ проксируем в приложение,
    # иначе при 401/403/502 от Apache пользователь получит 404 от gunicorn.
    ProxyPass        /error !
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Долгоживущие соединения не должны рваться по таймауту.
    ProxyTimeout 120

    # ======================================================================
    #  АРХИТЕКТУРА ВХОДА (важно!):
    #  Авторизацию ВНУТРИ сайта обеспечивает само приложение (@login_required):
    #  неавторизованного оно отправляет на /auth/login. Поэтому Kerberos НЕ
    #  навешиваем на весь сайт (<Location />) — иначе после успешного ЛОКАЛЬНОГО
    #  входа редирект на "/" упирался бы в доменную проверку Apache (401 -> его
    #  страница ошибки уходит в прокси -> 404).
    #
    #  Доменный вход (Kerberos ИЛИ ручной доменный логин+пароль) — только на одной
    #  точке /auth/sso. На неё ведёт кнопка «Войти по доменной учётной записи»
    #  со страницы /auth/login.
    # ======================================================================
    <Location /auth/sso>
        AuthType GSSAPI
        AuthName "Вход по доменной учётной записи"
        GssapiCredStore keytab:/etc/httpd2/srvc01061.keytab
        GssapiLocalName Off
        # Если Kerberos/Negotiate не сработал — ручной ввод ДОМЕННОГО логина/пароля
        # (Apache проверит через контроллер домена/KDC):
        GssapiBasicAuth On
        GssapiBasicAuthMech krb5
        Require valid-user
    </Location>

    ErrorLog  /var/log/httpd2/sd_error.log
    CustomLog /var/log/httpd2/sd_access.log combined
</VirtualHost>

# ----------------------------------------------------------------------
#  Поведение входа:
#   • доменный ПК, билет есть      → вход автоматически, без пароля;
#   • Kerberos не сработал          → браузер спросит логин/пароль → ДОМЕННАЯ учётка;
#   • недоменный ПК                 → то же окно → ДОМЕННАЯ учётка;
#   • домен/KDC недоступен          → открыть https://<сервер>/auth/login и войти
#                                     ЛОКАЛЬНОЙ учёткой (запасной админ/тестовые).
#
#  ВАЖНО:
#   • Basic-вход (ручной ввод пароля) — только по HTTPS (пароль шифруется).
#   • Для локального входа при недоступном домене открывайте сразу /auth/login
#     (на корень "/" Apache будет требовать домен).
#   • Имя пользователя приложение читает из заголовка X-Remote-User (строка
#     RequestHeader выше). REMOTE_USER в окружении WSGI при проксировании на
#     gunicorn НЕ появляется — поэтому пробрасываем именно заголовком.
#   • Порт 8000 наружу не открывать — приложение должно быть доступно только
#     через Apache (gunicorn слушает 127.0.0.1).
# ----------------------------------------------------------------------
