# Конфигурация Apache (обратный прокси перед gunicorn) для ServiceDesk.
#
# Куда положить (Ubuntu/Debian):  /etc/apache2/sites-available/servicedesk.conf
# Затем включить:                 sudo a2ensite servicedesk
#
# Нужные модули Apache (включить один раз):
#   sudo a2enmod proxy proxy_http headers
#   (для Kerberos на работе дополнительно — модуль auth_gssapi, см. ниже)

<VirtualHost *:80>
    # Имя, по которому будут открывать сервис.
    # Дома можно поставить любое (например servicedesk.local) и прописать его
    # в /etc/hosts. На работе — реальное доменное имя.  <<< ЗАМЕНИТЬ >>>
    ServerName servicedesk.local

    # Всё проксируем на gunicorn (включая /static и /socket.io — так проще,
    # для внутреннего сервиса производительности достаточно).
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    ErrorLog  ${APACHE_LOG_DIR}/servicedesk_error.log
    CustomLog ${APACHE_LOG_DIR}/servicedesk_access.log combined

    # =================================================================
    #  KERBEROS — ВКЛЮЧАТЬ ТОЛЬКО НА РАБОТЕ (когда сервер в домене).
    #  Дома (без домена) этот блок оставьте закомментированным —
    #  будет работать обычный вход по логину/паролю.
    #
    #  Предварительно на сервере:
    #    sudo apt-get install libapache2-mod-auth-gssapi
    #    sudo a2enmod auth_gssapi
    #  и создать keytab для службы HTTP (см. инструкцию, раздел про работу).
    # =================================================================
    #
    # <Location />
    #     AuthType GSSAPI
    #     AuthName "Domain Login"
    #     GssapiCredStore keytab:/etc/apache2/servicedesk.keytab
    #     # передавать имя пользователя приложению в REMOTE_USER
    #     GssapiLocalName Off
    #     Require valid-user
    # </Location>
</VirtualHost>
