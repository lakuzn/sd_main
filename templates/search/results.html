{% extends "base.html" %}

{% block title %}Результаты поиска по запросу "{{ query_text }}"{% endblock %}

{% block content %}
<section aria-labelledby="search" class="section">
    <div class="section__content">
        <div class="content__info">
            <h1 id="search" class="h1 content__title">Результаты поиска</h1>
            <p class="content__description">Результаты по запросу "<strong>{{ query_text }}</strong>"</p>
        </div>

        <div class="search-filter">
            <a href="#" class="button button--sm button--outline" data-type="all">Все <span id="count-all">0</span></a>
            <a href="#" class="button button--sm button--outline" data-type="tickets">Заявки <span
                    id="count-tickets">0</span></a>
            <a href="#" class="button button--sm button--outline" data-type="knowledge">База знаний <span
                    id="count-knowledge">0</span></a>
        </div>

        <div id="search-results" class="search-results">
            <div id="tickets-container"></div>
            <div id="knowledge-container"></div>
        </div>
</section>
{% endblock %}

{% block script %}
<script>
    window.query_text = "{{  query_text }}";
</script>

<script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
{% endblock %}
