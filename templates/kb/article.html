{% extends "base.html" %}

{% block title %}{{article.title}}{% endblock %}

{% block content %}
<section aria-labelledby="answer" class="section">
    <div class="section__content">
        <div class="content__child">
            <a href="{{ url_for ('kb.catalog')}}" class="icon--16 icon__arrowback--before button"
                title="Назад к каталогу"></a>

            <div class="content__info">
                {% if article.is_staff_only %}
                <span>Только для персонала</span>
                {% endif %}

                <h1 id="answer" class="h1 content__title">
                    {{article.title}}
                </h1>

                <p class="content__description">{{article.category.name}}</p>
            </div>

            {% if can_edit %}
            <div class="content__actions article__actions">
                <a href="{{ url_for('kb.edit_article', id=article.id) }}"
                    class="button button--outline button--sm">
                    Изменить
                </a>
                <form method="POST" action="{{ url_for('kb.delete_article', id=article.id) }}"
                    onsubmit="return confirm('Удалить статью безвозвратно?');" style="display: inline;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="button button--outline button--sm">
                        Удалить
                    </button>
                </form>
            </div>
            {% endif %}
        </div>
        <div class="article-form__richtext">
            <div class="ql-editor">
                {{ article.content | safe}}
            </div>
        </div>
    </div>
</section>
{% endblock %}
