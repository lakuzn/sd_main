{% extends "base.html" %}

{% block content %}
<section aria-labelledby="article_create" class="section">
    <div class="section__content">
        <div class="content__child">
            <a href="{{ url_for('kb.catalog') }}" class="icon--16 icon__arrowback--before button"
                title="Вернуться ко всем заявкам"></a>
            <div class="content__info">
                <h1 id="article_create" class="h1 content__title">
                    {{ 'Редактирование статьи' if article else 'Создание статьи для Базы Знаний' }}
                </h1>
            </div>
        </div>

        <form method="POST" action="" class="article-form">
            {{ form.hidden_tag() }}

            <div class="article-form__group">
                <label class="article-form__label" for="title">Заголовок статьи</label>
                <input id="title" name="title" placeholder="Введите содержательный заголовок" type="text"
                    aria-required="true" required class="button button--outline button--md"
                    value="{{ article.title if article else '' }}">
            </div>

            <!-- Начало. Категории -->
            <input type="hidden" name="category_id" id="category_id"
                value="{{ article.category_id if article else '' }}">

            <div class="dropdown-relative">
                <label class="article-form__label">Категория</label>
                <button id="articleCategory" type="button" aria-haspopup="listbox" aria-expanded="false"
                    aria-label="Выбрать категорию" class="article-category__button button button--md button--outline">
                    {{ article.category.name if article and article.category else 'ПО и Доступы' }}
                </button>

                <div class="dropdown dropdown-article__category" style="display: none;">
                    <ul id="articleCategoryList" role="listbox" aria-label="Список категорий" class="dropdown-list">
                    </ul>
                </div>
            </div>
            <!-- Конец. Категории -->

            <textarea id="hidden-content" name="content" aria-required="true" required style="display: none">{{ article.content if article else '' }}</textarea>

            <div class="article-form__richtext">
                <div id="editor-container"></div>
            </div>

            <div class="article-form__attach">
                <label for="article-attachment" class="icon--16 icon__file--before button button--outline button--md"
                    title="Прикрепить файл (docx, pptx, xlsx и др.)">
                    Прикрепить файл
                </label>
                <input type="file" id="article-attachment" accept="*/*" style="display: none;">
                <small class="ticket__group-description">
                    Файл будет добавлен в текст статьи в виде ссылки для скачивания.
                </small>
            </div>

            <div class="article-form__checkbox">
                <label class="article-form__label" for="is_staff_only">Только для сотрудников</label>
                <input id="is_staff_only" name="is_staff_only" type="checkbox"
                    class="button button--outline button--md"
                    {{ 'checked' if article and article.is_staff_only else '' }}>
            </div>

            <button type="submit" id="submit-btn" class="article-form__button button button--solid button--md">
                {{ 'Сохранить изменения' if article else 'Опубликовать статью' }}
            </button>
        </form>
    </div>
</section>
{% endblock %}

{% block script %}
<script src="{{ url_for('static', filename='js/quill.min.js') }}"></script>

<script>
    // Инициализируем редактор
    const quill = new Quill('#editor-container', {
        theme: 'snow', // Включаем светлую тему
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }], // Заголовки (H1, H2, H3, Обычный текст)
                ['bold', 'italic', 'underline', 'strike'], // Форматирование текста
                [{ 'color': [] }, { 'background': [] }], // Выбор цвета текста и фона
                [{ 'list': 'ordered' }, { 'list': 'bullet' }], // Нумерованные и маркированные списки
                [{ 'align': [] }], // Выравнивание
                ['link', 'image'], // Вставка ссылок и картинок
                ['clean'] // Кнопка "Очистить форматирование"
            ]
        }
    });

    const hiddenInput = document.getElementById('hidden-content');

    if (hiddenInput.value) {
        quill.root.innerHTML = hiddenInput.value;
    }

    quill.on('text-change', function () {
        hiddenInput.value = quill.getSemanticHTML();
    });

    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function (e) {
            const html = quill.getSemanticHTML();

            if (html === '<p></p>') {
                hiddenInput.value = '';
            } else {
                hiddenInput.value = html;
            }
        });
    }

    // Прикрепление файлов (docx, pptx, xlsx и др.) — вставляем ссылку в текст статьи
    (function () {
        const attachInput = document.getElementById('article-attachment');
        if (!attachInput) return;

        const csrfMeta = document.querySelector('meta[name="csrf_token"]');
        const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';

        attachInput.addEventListener('change', async function () {
            const file = attachInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('csrf_token', csrfToken);

            try {
                const response = await fetch("{{ url_for('kb.upload_attachment') }}", {
                    method: 'POST',
                    headers: { 'X-CSRFToken': csrfToken },
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'success') {
                    const range = quill.getSelection(true);
                    const label = result.file_name;
                    quill.insertText(range.index, label, { link: result.url });
                    quill.insertText(range.index + label.length, '\n');
                    quill.setSelection(range.index + label.length + 1);
                    hiddenInput.value = quill.getSemanticHTML();
                } else {
                    alert('Ошибка: ' + (result.message || 'не удалось загрузить файл'));
                }
            } catch (error) {
                alert('Не удалось загрузить файл. Проверьте соединение.');
            } finally {
                attachInput.value = '';
            }
        });
    })();
</script>
{% endblock %}
